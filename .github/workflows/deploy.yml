name: Deploy Linkding

on:
  push:
     branches:
      - main


jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3


      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2


      - name: Terraform Init
        run: terraform init
        working-directory: terraform


      - name: Terraform plan
        run: terraform plan
        working-directory: terraform


      - name: Terraform apply
        run: terraform apply
        working-directory: terraform
